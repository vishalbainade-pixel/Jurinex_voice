services:
  postgres:
    image: postgres:16-alpine
    container_name: jurinex_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jurinex_call_agent
    ports:
      - "5432:5432"
    volumes:
      - jurinex_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jurinex_call_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: jurinex_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/jurinex_call_agent
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/jurinex_call_agent
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  jurinex_pgdata:
